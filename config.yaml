name: anticapture-indexer
description: Anticapture DAO Governance Indexer

field_selection:
  transaction_fields:
    - hash
    - from
    - to

contracts:
  # === UNI (Ethereum) ===
  - name: UNIToken
    abi_file_path: ./abis/UNIToken.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 amount)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  - name: UNIGovernor
    abi_file_path: ./abis/UNIGovernor.json
    events:
      - event: "VoteCast(address indexed voter, uint256 proposalId, uint8 support, uint256 votes, string reason)"
      - event: "ProposalCreated(uint256 id, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 startBlock, uint256 endBlock, string description)"
      - event: "ProposalCanceled(uint256 id)"
      - event: "ProposalExecuted(uint256 id)"
      - event: "ProposalQueued(uint256 id, uint256 eta)"

  # === ENS (Ethereum) ===
  - name: ENSToken
    abi_file_path: ./abis/ENSToken.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  - name: ENSGovernor
    abi_file_path: ./abis/ENSGovernor.json
    events:
      - event: "VoteCast(address indexed voter, uint256 proposalId, uint8 support, uint256 weight, string reason)"
      - event: "ProposalCreated(uint256 proposalId, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 startBlock, uint256 endBlock, string description)"
      - event: "ProposalCanceled(uint256 proposalId)"
      - event: "ProposalExecuted(uint256 proposalId)"
      - event: "ProposalQueued(uint256 proposalId, uint256 eta)"

  # === ARB (Arbitrum) ===
  - name: ARBToken
    abi_file_path: ./abis/ARBToken.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  # === OP (Optimism) ===
  - name: OPToken
    abi_file_path: ./abis/OPToken.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  - name: OPGovernor
    abi_file_path: ./abis/OPGovernor.json
    events:
      - event: "VoteCast(address indexed voter, uint256 proposalId, uint8 support, uint256 weight, string reason)"
      - event: "ProposalCreated(uint256 proposalId, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 startBlock, uint256 endBlock, string description)"
        name: ProposalCreatedStandard
      - event: "ProposalCreated(uint256 indexed proposalId, address indexed proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 startBlock, uint256 endBlock, string description, uint8 proposalType)"
        name: ProposalCreatedWithType
      - event: "ProposalCreated(uint256 indexed proposalId, address indexed proposer, address indexed votingModule, bytes proposalData, uint256 startBlock, uint256 endBlock, string description, uint8 proposalType)"
        name: ProposalCreatedModuleWithType
      - event: "ProposalCreated(uint256 proposalId, address proposer, address votingModule, bytes proposalData, uint256 startBlock, uint256 endBlock, string description)"
        name: ProposalCreatedModule
      - event: "ProposalCanceled(uint256 proposalId)"
      - event: "ProposalExecuted(uint256 proposalId)"
      - event: "ProposalQueued(uint256 proposalId, uint256 eta)"

  # === GTC (Ethereum) ===
  - name: GTCToken
    abi_file_path: ./abis/GTCToken.json
    events:
