# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: anticapture-indexer
description: Anticapture Governance HyperIndex - converted from Ponder

contracts:
  # ============================================================
  # ERC20 Token contracts (Transfer + DelegateChanged + DelegateVotesChanged)
  # Uses "value" param naming
  # ============================================================
  - name: ERC20Token
    abi_file_path: ./abis/ERC20Token.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  # ERC20 Token contracts that use "amount" param naming (UNI, COMP, GTC)
  - name: ERC20TokenAmount
    abi_file_path: ./abis/ERC20TokenAmount.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 amount)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  # ERC721 Token contracts (Nouns)
  - name: ERC721Token
    abi_file_path: ./abis/ERC721Token.json
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
      - event: "DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)"
      - event: "DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)"

  # ============================================================
  # Governor contracts (startBlock/endBlock naming)
  # ============================================================
  - name: Governor
    abi_file_path: ./abis/Governor.json
    events:
      - event: "VoteCast(address indexed voter, uint256 proposalId, uint8 support, uint256 weight, string reason)"
      - event: "ProposalCreated(uint256 proposalId, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 startBlock, uint256 endBlock, string description)"
      - event: "ProposalCanceled(uint256 proposalId)"
      - event: "ProposalExecuted(uint256 proposalId)"
      - event: "ProposalQueued(uint256 proposalId, uint256 eta)"
      - event: "ProposalExtended(uint256 proposalId, uint64 extendedDeadline)"

  # Governor contracts (voteStart/voteEnd naming - COMP, SCR, OBOL, ZK)
  - name: GovernorVoteStart
    abi_file_path: ./abis/GovernorVoteStart.json
    events:
      - event: "VoteCast(address indexed voter, uint256 proposalId, uint8 support, uint256 weight, string reason)"
      - event: "ProposalCreated(uint256 proposalId, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 voteStart, uint256 voteEnd, string description)"
      - event: "ProposalCanceled(uint256 proposalId)"
      - event: "ProposalExecuted(uint256 proposalId)"
      - event: "ProposalQueued(uint256 proposalId, uint256 etaSeconds)"
      - event: "ProposalExtended(uint256 proposalId, uint64 extendedDeadline)"

  # Nouns Governor (legacy: bool support, votes instead of weight, id instead of proposalId)
  - name: NounsGovernor
    abi_file_path: ./abis/NounsGovernor.json
    events:
      - event: "VoteCast(address indexed voter, uint256 proposalId, bool support, uint256 votes, string reason)"
      - event: "ProposalCreated(uint256 id, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 startBlock, uint256 endBlock, string description)"
      - event: "ProposalCanceled(uint256 id)"
      - event: "ProposalExecuted(uint256 id)"
      - event: "ProposalQueued(uint256 id, uint256 eta)"

  # Nouns Auction
  - name: NounsAuction
    abi_file_path: ./abis/NounsAuction.json
    events:
      - event: "AuctionSettled(uint256 indexed nounId, address winner, uint256 amount)"

field_selection:
  transaction_fields:
    - hash
    - from
    - to

