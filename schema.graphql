## ============================================================
## Anticapture Governance Indexer - Envio HyperIndex
## Converted from Ponder indexer at github.com/blockful-io/anticapture
## ============================================================

## ============================================================
## Core Token & Account Entities
## ============================================================

type Token @entity {
  id: ID!
  name: String!
  decimals: Int!
  totalSupply: BigInt!
  delegatedSupply: BigInt!
  cexSupply: BigInt!
  dexSupply: BigInt!
  lendingSupply: BigInt!
  circulatingSupply: BigInt!
  treasury: BigInt!
}

type Account @entity {
  id: ID!
}

type AccountBalance @entity {
  id: ID! # accountId-tokenId
  accountId: String! @index
  tokenId: String! @index
  balance: BigInt!
  delegate: String! @index
}

type AccountPower @entity {
  id: ID! # accountId
  accountId: String!
  daoId: String!
  votingPower: BigInt!
  votesCount: Int!
  proposalsCount: Int!
  delegationsCount: Int!
  lastVoteTimestamp: BigInt! @index
}

## ============================================================
## History Entities
## ============================================================

type VotingPowerHistory @entity {
  id: ID! # transactionHash-accountId-logIndex
  transactionHash: String!
  daoId: String!
  accountId: String!
  votingPower: BigInt!
  delta: BigInt!
  deltaMod: BigInt!
  timestamp: BigInt!
  logIndex: Int!
}

type BalanceHistory @entity {
  id: ID! # transactionHash-accountId-logIndex
  transactionHash: String!
  daoId: String!
  accountId: String!
  balance: BigInt!
  delta: BigInt!
  deltaMod: BigInt!
  timestamp: BigInt!
  logIndex: Int!
}

## ============================================================
## Delegation & Transfer Entities
## ============================================================

type Delegation @entity {
  id: ID! # transactionHash-delegatorAccountId-delegateAccountId
  transactionHash: String! @index
  daoId: String!
  delegateAccountId: String! @index
  delegatorAccountId: String! @index
  delegatedValue: BigInt! @index
  previousDelegate: String
  timestamp: BigInt! @index
  logIndex: Int!
  isCex: Boolean!
  isDex: Boolean!
  isLending: Boolean!
  isTotal: Boolean!
}

type Transfer @entity {
  id: ID! # transactionHash-fromAccountId-toAccountId
  transactionHash: String! @index
  daoId: String!
  tokenId: String!
  amount: BigInt! @index
  fromAccountId: String! @index
  toAccountId: String! @index
  timestamp: BigInt! @index
  logIndex: Int!
  isCex: Boolean!
  isDex: Boolean!
  isLending: Boolean!
  isTotal: Boolean!
}

## ============================================================
## Governance Entities
## ============================================================

type VoteOnchain @entity {
  id: ID! # voterAccountId-proposalId
  txHash: String!
  daoId: String!
  voterAccountId: String!
  proposalId: String!
  support: String!
  votingPower: BigInt!
  reason: String
  timestamp: BigInt!
}

type ProposalOnchain @entity {
  id: ID!
  txHash: String!
  daoId: String!
  proposerAccountId: String! @index
  targets: String! # JSON array serialized
  values: String! # JSON array serialized
  signatures: String! # JSON array serialized
  calldatas: String! # JSON array serialized
  startBlock: Int!
  endBlock: Int!
  title: String
  description: String!
  timestamp: BigInt!
  endTimestamp: BigInt!
  status: String!
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  proposalType: Int
}

## ============================================================
## Metrics Entities
## ============================================================

type DaoMetricsDayBucket @entity {
  id: ID! # date-tokenId-metricType
  date: BigInt!
  daoId: String!
  tokenId: String!
  metricType: String!
  open: BigInt!
  close: BigInt!
  low: BigInt!
  high: BigInt!
  average: BigInt!
  volume: BigInt!
  count: Int!
  lastUpdate: BigInt!
}

type Transaction @entity {
  id: ID! # transactionHash
  transactionHash: String!
  fromAddress: String
  toAddress: String
  isCex: Boolean!
  isDex: Boolean!
  isLending: Boolean!
  isTotal: Boolean!
  timestamp: BigInt!
}

type TokenPrice @entity {
  id: ID! # timestamp string
  price: BigInt!
  timestamp: BigInt!
}

type FeedEvent @entity {
  id: ID! # txHash-logIndex
  txHash: String!
  logIndex: Int!
  eventType: String! @index
  value: BigInt!
  timestamp: BigInt! @index
  metadata: String # JSON stringified
}
